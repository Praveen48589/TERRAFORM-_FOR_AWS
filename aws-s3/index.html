<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LeetCode 500 — Master Plan</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#050510;--card:#0c0c1e;--card2:#121228;
  --border:rgba(255,255,255,0.06);--text:#e8e8ff;--muted:#5a5a7a;
  --easy:#00ffa3;--med:#ffcc44;--hard:#ff4466;
  --gold:#ffd700;--violet:#9d4edd;--cyan:#00d4ff;--pink:#ff2d78;
}
html{scroll-behavior:smooth}
body{font-family:'Space Grotesk',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;cursor:default}

/* ═══ ANIMATED AURORA BG ═══ */
.aurora{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.aurora-blob{position:absolute;border-radius:50%;filter:blur(80px);opacity:0;animation:blobFloat linear infinite}
@keyframes blobFloat{
  0%{transform:translate(0,0) scale(1);opacity:0}
  15%{opacity:var(--op,.18)}
  85%{opacity:var(--op,.18)}
  100%{transform:translate(var(--tx,40px),var(--ty,-60px)) scale(1.15);opacity:0}
}

/* ═══ FLOATING ICONS ═══ */
#floatLayer{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.fi{position:absolute;opacity:0;animation:floatUp var(--dur,14s) var(--del,0s) ease-in-out infinite;will-change:transform}
@keyframes floatUp{
  0%  {transform:translateY(105vh) rotate(0deg) scale(.6);opacity:0}
  8%  {opacity:var(--op,.85)}
  88% {opacity:var(--op,.6)}
  100%{transform:translateY(-10vh) rotate(var(--rot,360deg)) scale(1.05);opacity:0}
}

/* ═══ CURSOR TRAIL ═══ */
.cursor-dot{position:fixed;width:6px;height:6px;border-radius:50%;pointer-events:none;z-index:9998;mix-blend-mode:screen;transition:transform .05s;animation:dotFade .6s ease forwards}
@keyframes dotFade{from{opacity:.9;transform:scale(1)}to{opacity:0;transform:scale(0)}}

/* ═══ WRAP ═══ */
.wrap{position:relative;z-index:1;max-width:1020px;margin:0 auto;padding:0 1.5rem 6rem}

/* ═══ HERO ═══ */
.hero{text-align:center;padding:4rem 0 2.5rem;animation:heroIn 1s cubic-bezier(.22,1,.36,1) both}
@keyframes heroIn{from{opacity:0;transform:translateY(-50px) scale(.96)}to{opacity:1;transform:translateY(0) scale(1)}}

.hero-badge{
  display:inline-flex;align-items:center;gap:8px;
  font-family:'Space Mono',monospace;font-size:10px;letter-spacing:.22em;text-transform:uppercase;
  color:var(--cyan);border:1px solid rgba(0,212,255,.25);padding:6px 20px;
  border-radius:99px;margin-bottom:1.5rem;background:rgba(0,212,255,.05);
  animation:badgePulse 4s ease-in-out infinite alternate;
}
@keyframes badgePulse{from{box-shadow:0 0 0 rgba(0,212,255,0)}to{box-shadow:0 0 30px rgba(0,212,255,.3),0 0 60px rgba(0,212,255,.1)}}

.hero h1{
  font-family:'Orbitron',monospace;font-weight:900;
  font-size:clamp(2.2rem,6.5vw,5.2rem);line-height:.9;letter-spacing:-.02em;
  margin-bottom:1rem;
  background:linear-gradient(120deg,#fff 0%,#c084fc 25%,#00d4ff 50%,#00ffa3 72%,#ffd700 100%);
  background-size:300% auto;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  animation:titleShimmer 6s linear infinite;
}
@keyframes titleShimmer{from{background-position:0% center}to{background-position:300% center}}
.hero-sub{color:var(--muted);font-size:14px;letter-spacing:.04em;font-weight:300}
.hero-sub strong{color:var(--text);font-weight:600}

/* ═══ SCOREBOARD ═══ */
.scoreboard{
  display:grid;grid-template-columns:auto 1fr auto;gap:1.5rem;align-items:center;
  background:var(--card);border:1px solid var(--border);border-radius:24px;
  padding:1.6rem 2rem;margin:2rem 0 1.2rem;position:relative;overflow:hidden;
  animation:fadeUp .9s .1s cubic-bezier(.22,1,.36,1) both;
}
.scoreboard::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(157,78,221,.08) 0%,transparent 50%,rgba(0,212,255,.05) 100%);pointer-events:none}
.scoreboard::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(157,78,221,.5),rgba(0,212,255,.5),transparent)}
@keyframes fadeUp{from{opacity:0;transform:translateY(32px)}to{opacity:1;transform:translateY(0)}}

/* SVG ring */
.ring-svg{transform:rotate(-90deg)}
.r-bg{stroke:rgba(255,255,255,.05)}
.r-fill{stroke:url(#mainGrad);stroke-linecap:round;stroke-dasharray:245;stroke-dashoffset:245;transition:stroke-dashoffset 1s cubic-bezier(.22,1,.36,1)}
.ring-inner{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.ring-pct{font-family:'Orbitron',monospace;font-size:15px;font-weight:700;color:#fff;line-height:1}
.ring-lbl{font-family:'Space Mono',monospace;font-size:8px;color:var(--muted);letter-spacing:.1em;margin-top:2px}

.score-mid{display:flex;flex-direction:column;gap:8px}
.score-title{font-family:'Orbitron',monospace;font-size:16px;font-weight:700;letter-spacing:-.01em}
.score-sub{font-family:'Space Mono',monospace;font-size:11px;color:var(--muted)}
.mega-bar{height:8px;background:rgba(255,255,255,.05);border-radius:99px;overflow:hidden;margin-top:4px}
.mega-fill{height:100%;border-radius:99px;width:0%;transition:width 1s cubic-bezier(.22,1,.36,1);background:linear-gradient(90deg,#9d4edd,#00d4ff,#00ffa3);background-size:200%;animation:fillShimmer 3s linear infinite}
@keyframes fillShimmer{from{background-position:0%}to{background-position:200%}}

.score-right{display:flex;flex-direction:column;gap:8px;align-items:flex-end}
.reset-btn{font-family:'Space Mono',monospace;font-size:10px;letter-spacing:.04em;padding:8px 16px;border-radius:10px;border:1px solid rgba(255,68,102,.28);background:rgba(255,68,102,.07);color:var(--hard);cursor:pointer;transition:all .2s;white-space:nowrap}
.reset-btn:hover{background:rgba(255,68,102,.18);box-shadow:0 0 20px rgba(255,68,102,.25)}

/* ═══ STAT PILLS ═══ */
.stat-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:1.2rem;animation:fadeUp .8s .2s cubic-bezier(.22,1,.36,1) both}
.sp{
  background:var(--card);border:1px solid var(--border);border-radius:16px;
  padding:.9rem .8rem;text-align:center;position:relative;overflow:hidden;
  transition:transform .2s,box-shadow .2s;cursor:default;
}
.sp:hover{transform:translateY(-5px)}
.sp-shine{position:absolute;top:0;left:0;right:0;height:1px}
.sp-total .sp-shine{background:linear-gradient(90deg,transparent,rgba(157,78,221,.8),transparent)}
.sp-e .sp-shine{background:linear-gradient(90deg,transparent,var(--easy),transparent)}
.sp-m .sp-shine{background:linear-gradient(90deg,transparent,var(--med),transparent)}
.sp-h .sp-shine{background:linear-gradient(90deg,transparent,var(--hard),transparent)}
.sp-num{font-family:'Orbitron',monospace;font-size:1.9rem;font-weight:900;display:block;line-height:1.1}
.sp-total .sp-num{background:linear-gradient(135deg,#c084fc,#00d4ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.sp-e .sp-num{color:var(--easy)}
.sp-m .sp-num{color:var(--med)}
.sp-h .sp-num{color:var(--hard)}
.sp-lbl{font-family:'Space Mono',monospace;font-size:9px;text-transform:uppercase;letter-spacing:.12em;color:var(--muted);margin-top:2px}

/* ═══ NAV TABS ═══ */
.nav-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1.5rem;animation:fadeUp .8s .28s cubic-bezier(.22,1,.36,1) both;background:var(--card);border:1px solid var(--border);border-radius:16px;padding:8px}
.ntab{font-family:'Space Mono',monospace;font-size:10px;letter-spacing:.08em;padding:7px 14px;border-radius:10px;border:none;background:transparent;color:var(--muted);cursor:pointer;transition:all .18s;white-space:nowrap}
.ntab:hover{color:var(--text);background:rgba(255,255,255,.05)}
.ntab.active{background:linear-gradient(135deg,var(--violet),var(--cyan));color:#fff;box-shadow:0 4px 18px rgba(157,78,221,.4)}

/* ═══ FAVOURITES PANEL ═══ */
.fav-panel{
  background:var(--card);border:1px solid rgba(255,215,0,.2);border-radius:22px;
  margin-bottom:1.2rem;overflow:hidden;
  animation:fadeUp .8s .32s cubic-bezier(.22,1,.36,1) both;
  box-shadow:0 0 50px rgba(255,215,0,.05),inset 0 0 50px rgba(255,215,0,.02);
  transition:box-shadow .3s;
}
.fav-panel.has-items{box-shadow:0 0 50px rgba(255,215,0,.12),inset 0 0 50px rgba(255,215,0,.03)}
.fav-hdr{display:flex;align-items:center;gap:12px;padding:14px 20px;cursor:pointer;user-select:none;background:linear-gradient(90deg,rgba(255,215,0,.07) 0%,transparent 65%);transition:background .2s}
.fav-hdr:hover{background:linear-gradient(90deg,rgba(255,215,0,.13) 0%,transparent 65%)}
.fav-hdr-icon{font-size:20px;animation:starSpin 4s ease-in-out infinite;filter:drop-shadow(0 0 8px #ffd700)}
@keyframes starSpin{0%,100%{transform:rotate(-10deg) scale(1)}50%{transform:rotate(10deg) scale(1.15)}}
.fav-hdr-title{font-family:'Orbitron',monospace;font-size:13px;font-weight:700;color:var(--gold);flex:1;letter-spacing:.02em}
.fav-hdr-sub{font-family:'Space Mono',monospace;font-size:10px;color:rgba(255,215,0,.5);margin-right:8px}
.fav-pill{font-family:'Space Mono',monospace;font-size:10px;background:rgba(255,215,0,.12);color:var(--gold);border:1px solid rgba(255,215,0,.25);border-radius:99px;padding:3px 11px;letter-spacing:.04em;transition:background .2s}
.fav-chevron{font-size:10px;color:var(--gold);transition:transform .3s cubic-bezier(.22,1,.36,1);margin-left:6px}
.fav-panel.open .fav-chevron{transform:rotate(90deg)}
.fav-body{display:none;border-top:1px solid rgba(255,215,0,.1)}
.fav-body.open{display:block;animation:expandIn .3s cubic-bezier(.22,1,.36,1)}
@keyframes expandIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
.fav-empty{padding:2.5rem;text-align:center;font-family:'Space Mono',monospace;font-size:11px;color:var(--muted);line-height:1.8}
.fav-empty-icon{font-size:2.5rem;display:block;margin-bottom:.8rem;filter:grayscale(.6)}
.fav-list{display:flex;flex-direction:column}
.fav-item{display:flex;align-items:center;gap:10px;padding:10px 20px;border-bottom:1px solid rgba(255,255,255,.03);transition:background .12s}
.fav-item:last-child{border-bottom:none}
.fav-item:hover{background:rgba(255,215,0,.04)}
.fav-item-num{font-family:'Space Mono',monospace;font-size:11px;color:rgba(255,255,255,.2);width:40px;flex-shrink:0}
.fav-item-name{flex:1;font-size:13px;font-weight:500}
.fav-item-name a{color:#f9c74f;text-decoration:none;transition:color .15s}
.fav-item-name a:hover{color:#fff}
.fav-item-topic{font-family:'Space Mono',monospace;font-size:9px;color:var(--muted);margin-right:6px;white-space:nowrap}
.fav-rm{background:none;border:none;cursor:pointer;color:var(--hard);font-size:13px;opacity:.4;transition:opacity .2s,transform .2s;padding:2px 5px}
.fav-rm:hover{opacity:1;transform:scale(1.25)}
.fav-footer{padding:12px 20px;border-top:1px solid rgba(255,215,0,.08)}
.fav-clear{font-family:'Space Mono',monospace;font-size:10px;padding:6px 14px;border-radius:8px;border:1px solid rgba(255,68,102,.25);background:rgba(255,68,102,.06);color:var(--hard);cursor:pointer;transition:all .2s}
.fav-clear:hover{background:rgba(255,68,102,.14)}

/* ═══ TOPIC BLOCKS ═══ */
.topics-wrap{animation:fadeUp .8s .38s cubic-bezier(.22,1,.36,1) both}
.tblock{
  border:1px solid var(--border);border-radius:20px;margin-bottom:10px;
  overflow:hidden;background:var(--card);
  transition:border-color .2s,box-shadow .2s,transform .15s;
}
.tblock:hover{border-color:rgba(255,255,255,.12);transform:translateX(2px)}
.tblock.topen{box-shadow:0 12px 60px rgba(0,0,0,.5);transform:translateX(0)}
.tblock.topen .t-chevron{transform:rotate(90deg)}

.t-hdr{display:flex;align-items:center;gap:12px;padding:13px 18px;cursor:pointer;user-select:none;position:relative;overflow:hidden}
.t-hdr::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--tc,#555);border-radius:0 2px 2px 0;opacity:.8}
.t-hdr::after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,rgba(var(--trgb,80,80,80),.1) 0%,transparent 45%);pointer-events:none}

.t-icon-wrap{
  width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;
  font-size:20px;flex-shrink:0;position:relative;overflow:hidden;
  background:rgba(var(--trgb,80,80,80),.18);
  box-shadow:0 4px 16px rgba(var(--trgb,80,80,80),.25);
  transition:transform .25s,box-shadow .25s;
}
.t-hdr:hover .t-icon-wrap{transform:scale(1.1) rotate(-6deg);box-shadow:0 6px 24px rgba(var(--trgb,80,80,80),.45)}
.t-icon-wrap::after{content:'';position:absolute;inset:0;background:radial-gradient(circle at 30% 30%,rgba(255,255,255,.25),transparent 60%)}

.t-info{flex:1;min-width:0}
.t-name{font-family:'Orbitron',monospace;font-size:12px;font-weight:700;letter-spacing:.01em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.t-meta{display:flex;align-items:center;gap:8px;margin-top:3px}
.t-tip{font-family:'Space Mono',monospace;font-size:9px;color:var(--muted)}
.t-mini-e,.t-mini-m,.t-mini-h{font-family:'Space Mono',monospace;font-size:8px;padding:1px 5px;border-radius:4px;font-weight:700}
.t-mini-e{background:rgba(0,255,163,.1);color:var(--easy)}
.t-mini-m{background:rgba(255,204,68,.1);color:var(--med)}
.t-mini-h{background:rgba(255,68,102,.1);color:var(--hard)}

.t-progress{display:flex;align-items:center;gap:8px;flex-shrink:0}
.t-pbar{width:54px;height:5px;background:rgba(255,255,255,.06);border-radius:99px;overflow:hidden}
.t-pfill{height:100%;border-radius:99px;background:var(--tc,#555);width:0%;transition:width .7s cubic-bezier(.22,1,.36,1);box-shadow:0 0 8px var(--tc,#555)}
.t-cnt{font-family:'Space Mono',monospace;font-size:10px;color:var(--muted);min-width:34px;text-align:right}
.t-chevron{font-size:10px;color:var(--muted);transition:transform .3s cubic-bezier(.22,1,.36,1);margin-left:4px}

.t-body{display:none;border-top:1px solid var(--border)}
.t-body.topen{display:block;animation:expandIn .28s cubic-bezier(.22,1,.36,1)}

/* table */
.q-table{width:100%;border-collapse:collapse}
.q-table thead th{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);padding:8px 16px;text-align:left;background:rgba(255,255,255,.018);border-bottom:1px solid var(--border)}
.q-table tbody tr{transition:background .1s;border-bottom:1px solid rgba(255,255,255,.022)}
.q-table tbody tr:hover{background:rgba(255,255,255,.03)}
.q-table tbody tr.done-r{background:rgba(0,255,163,.025)}
.q-table tbody tr.fav-r td .q-name a{color:var(--gold)!important}
td{padding:8px 16px;font-size:12.5px;vertical-align:middle}
.q-num{font-family:'Space Mono',monospace;font-size:10px;color:rgba(255,255,255,.18);width:42px}
.q-name a{color:#b4a9ff;text-decoration:none;font-weight:500;transition:color .15s}
.q-name a:hover{color:#fff}
.done-r .q-name a{text-decoration:line-through;color:var(--easy)!important;opacity:.65}
.badge{display:inline-block;font-family:'Space Mono',monospace;font-size:8px;font-weight:700;letter-spacing:.07em;padding:2px 7px;border-radius:99px;text-transform:uppercase}
.be{background:rgba(0,255,163,.1);color:var(--easy);border:1px solid rgba(0,255,163,.2)}
.bm{background:rgba(255,204,68,.1);color:var(--med);border:1px solid rgba(255,204,68,.2)}
.bh{background:rgba(255,68,102,.1);color:var(--hard);border:1px solid rgba(255,68,102,.2)}
.q-actions{text-align:right;white-space:nowrap}
.star-btn{font-size:13px;background:none;border:none;cursor:pointer;padding:2px 4px;opacity:.25;filter:grayscale(1);transition:opacity .2s,transform .2s,filter .2s;line-height:1}
.star-btn:hover{opacity:.8;transform:scale(1.25);filter:none}
.star-btn.on{opacity:1;filter:drop-shadow(0 0 5px #ffd700);animation:starPop .3s cubic-bezier(.22,1,.36,1)}
@keyframes starPop{0%{transform:scale(1.7)}100%{transform:scale(1)}}
.dbtn{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:.04em;padding:4px 11px;border-radius:7px;border:1px solid rgba(255,255,255,.1);background:transparent;color:var(--muted);cursor:pointer;transition:all .18s}
.dbtn:hover{border-color:var(--easy);color:var(--easy);background:rgba(0,255,163,.07)}
.dbtn.on{background:rgba(0,255,163,.1);border-color:rgba(0,255,163,.28);color:var(--easy)}

/* ═══ SCROLLBAR ═══ */
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:rgba(157,78,221,.4);border-radius:99px}
::-webkit-scrollbar-thumb:hover{background:rgba(157,78,221,.7)}

/* ═══ SECTION DIVIDER ═══ */
.section-label{font-family:'Orbitron',monospace;font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);margin:1.8rem 0 .7rem;display:flex;align-items:center;gap:10px}
.section-label::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,rgba(255,255,255,.08),transparent)}

@media(max-width:640px){
  .scoreboard{grid-template-columns:1fr;text-align:center}
  .score-right{align-items:center}
  .stat-row{grid-template-columns:repeat(2,1fr)}
  .t-name{font-size:11px}
  td{padding:7px 10px;font-size:11.5px}
}
</style>
</head>
<body>

<!-- Aurora blobs -->
<div class="aurora" id="aurora"></div>
<!-- Floating icons -->
<div id="floatLayer"></div>

<!-- SVG Gradient defs -->
<svg style="position:absolute;width:0;height:0">
  <defs>
    <linearGradient id="mainGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#9d4edd"/>
      <stop offset="50%" stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#00ffa3"/>
    </linearGradient>
  </defs>
</svg>

<div class="wrap">

  <!-- HERO -->
  <div class="hero">
    <div class="hero-badge">⚡ COMPLETE ROADMAP · ALL TOPICS · 500 QUESTIONS</div>
    <h1>LEETCODE<br>MASTER PLAN</h1>
    <p class="hero-sub"><strong>25 topics</strong> · Arrays to Advanced Graphs · Queues · DP · Everything</p>
  </div>

  <!-- SCOREBOARD -->
  <div class="scoreboard" style="animation-delay:.1s">
    <div style="position:relative;width:90px;height:90px;flex-shrink:0">
      <svg width="90" height="90" viewBox="0 0 90 90" class="ring-svg">
        <circle class="r-bg" cx="45" cy="45" r="39" fill="none" stroke-width="6"/>
        <circle class="r-fill" id="ringFill" cx="45" cy="45" r="39" fill="none" stroke-width="6"/>
      </svg>
      <div class="ring-inner">
        <div class="ring-pct" id="ringPct">0%</div>
        <div class="ring-lbl">DONE</div>
      </div>
    </div>
    <div class="score-mid">
      <div class="score-title" id="scoreTitle">LET'S BEGIN 🚀</div>
      <div class="score-sub" id="scoreSub">0 / 500 solved</div>
      <div class="mega-bar"><div class="mega-fill" id="megaFill"></div></div>
    </div>
    <div class="score-right">
      <button class="reset-btn" onclick="resetAll()">⟳ RESET ALL</button>
    </div>
  </div>

  <!-- STAT PILLS -->
  <div class="stat-row">
    <div class="sp sp-total"><div class="sp-shine"></div><span class="sp-num" id="sTotal">500</span><div class="sp-lbl">Total</div></div>
    <div class="sp sp-e"><div class="sp-shine"></div><span class="sp-num" id="sE">0</span><div class="sp-lbl">Easy</div></div>
    <div class="sp sp-m"><div class="sp-shine"></div><span class="sp-num" id="sM">0</span><div class="sp-lbl">Medium</div></div>
    <div class="sp sp-h"><div class="sp-shine"></div><span class="sp-num" id="sH">0</span><div class="sp-lbl">Hard</div></div>
  </div>

  <!-- NAV TABS -->
  <div class="nav-tabs">
    <button class="ntab active" onclick="filt('all',this)">ALL</button>
    <button class="ntab" onclick="filt('easy',this)">🟢 EASY</button>
    <button class="ntab" onclick="filt('medium',this)">🟡 MEDIUM</button>
    <button class="ntab" onclick="filt('hard',this)">🔴 HARD</button>
    <button class="ntab" onclick="filt('done',this)">✓ DONE</button>
    <button class="ntab" onclick="filt('todo',this)">◯ TODO</button>
    <button class="ntab" onclick="filt('fav',this)">⭐ FAVOURITES</button>
  </div>

  <!-- FAVOURITES PANEL -->

function updateGlobal(){
  const s=done.size, pct=Math.round(s/TOTAL*100);
  document.getElementById('megaFill').style.width=pct+'%';
  document.getElementById('ringPct').textContent=pct+'%';
  document.getElementById('ringFill').style.strokeDashoffset=245-(245*s/TOTAL);
  document.getElementById('scoreSub').textContent=s+' / '+TOTAL+' solved';
  const t=['LET\'S BEGIN 🚀','WARMING UP 🔥','ON A ROLL! 💪','HALFWAY HERO 🎯','SO CLOSE! 🏆','LEGEND: 500/500 🌟'];
  document.getElementById('scoreTitle').textContent=t[Math.min(5,Math.floor(pct/20))];
  let e=0,m=0,h=0;
  TOPICS.forEach(t=>t.qs.forEach(q=>{if(done.has(q.n)){if(q.d==='easy')e++;else if(q.d==='medium')m++;else h++;}}));
  document.getElementById('sE').textContent=e;
  document.getElementById('sM').textContent=m;
  document.getElementById('sH').textContent=h;
}
function updateBar(ti){
  const t=TOPICS[ti], s=t.qs.filter(q=>done.has(q.n)).length;
  const f=document.getElementById('pf-'+ti);if(f)f.style.width=Math.round(s/t.qs.length*100)+'%';
  const c=document.getElementById('pc-'+ti);if(c)c.textContent=s+'/'+t.qs.length;
}

const bStyle=document.createElement('style');
bStyle.textContent='@keyframes bp{0%{transform:translate(0,0) scale(1.4);opacity:1}100%{transform:translate(var(--bx),var(--by)) scale(0);opacity:0}}';
document.head.appendChild(bStyle);
function burst(el){
  const r=el.getBoundingClientRect();
  const cols2=['#00ffa3','#ffc94d','#9d4edd','#00d4ff','#ff5577','#ffd700'];
  const syms=['✦','★','◆','▲','●'];
  for(let i=0;i<10;i++){
    const d=document.createElement('div'), a=(i/10)*Math.PI*2, dist=40+Math.random()*30;
    d.style.cssText=`position:fixed;left:${r.left+r.width/2}px;top:${r.top}px;pointer-events:none;z-index:9999;font-size:${9+Math.random()*7}px;color:${cols2[i%cols2.length]};animation:bp .7s ease-out forwards;--bx:${Math.cos(a)*dist}px;--by:${Math.sin(a)*dist-18}px`;
    d.textContent=syms[i%syms.length];document.body.appendChild(d);
    setTimeout(()=>d.remove(),750);
  }
}
function toggleDone(qn,ti,btn){
  const row=btn.closest('tr');
  if(done.has(qn)){done.delete(qn);btn.textContent='Mark done';btn.classList.remove('on');row.classList.remove('done-r');}
  else{done.add(qn);btn.textContent='✓ Done';btn.classList.add('on');row.classList.add('done-r');burst(btn);}
  save();updateGlobal();updateBar(ti);
}

/* ─── FAVOURITES ─── */
function togFavPanel(){
  const panel=document.getElementById('favPanel');
  const body=document.getElementById('favBody');
  const open=body.classList.contains('open');
  body.classList.toggle('open',!open);
  panel.classList.toggle('open',!open);
}
function toggleFav(qn,ti,btn){
  if(favs.has(qn)){favs.delete(qn);btn.classList.remove('on');btn.title='Save to favourites';}
  else{favs.add(qn);btn.classList.add('on');btn.title='Remove from favourites';favBurst(btn);}
  saveFav();renderFavPanel();
}
function favBurst(el){
  const r=el.getBoundingClientRect();
  for(let i=0;i<7;i++){
    const d=document.createElement('div'), a=(i/7)*Math.PI*2, dist=28+Math.random()*18;
    d.style.cssText=`position:fixed;left:${r.left+r.width/2}px;top:${r.top+r.height/2}px;pointer-events:none;z-index:9999;font-size:11px;animation:bp .6s ease-out forwards;--bx:${Math.cos(a)*dist}px;--by:${Math.sin(a)*dist-8}px`;
    d.textContent='⭐';document.body.appendChild(d);setTimeout(()=>d.remove(),700);
  }
}
function removeFav(qn){
  favs.delete(qn);saveFav();
  const btn=document.getElementById('star-'+qn);
  if(btn){btn.classList.remove('on');btn.title='Save to favourites';}
  renderFavPanel();
}
function clearFavs(){
  if(!confirm('Clear all favourites?'))return;
  favs.clear();saveFav();
  document.querySelectorAll('.star-btn').forEach(b=>{b.classList.remove('on');b.title='Save to favourites';});
  renderFavPanel();
}
function renderFavPanel(){
  document.getElementById('favPill').textContent=favs.size+' saved';
  const panel=document.getElementById('favPanel');
  panel.classList.toggle('has-items',favs.size>0);
  const cont=document.getElementById('favContent');
  if(favs.size===0){
    cont.innerHTML=`<div class="fav-empty"><span class="fav-empty-icon">⭐</span>No favourites yet!<br>Click the ⭐ star on any tough question to save it here.<br>Build your personal retry list.</div>`;
    return;
  }
  const rows=[];
  TOPICS.forEach((t,ti)=>{
    const cfg=TC[t.ti];
    t.qs.forEach(q=>{if(favs.has(q.n))rows.push({...q,topicName:cfg.name,ti});});
  });
  cont.innerHTML=`<div class="fav-list">${rows.map(q=>`
    <div class="fav-item">
      <span class="fav-item-num">${q.n}</span>
      <span class="fav-item-name"><a href="https://leetcode.com/problems/${slug(q.t)}/" target="_blank">${q.t}</a></span>
      <span class="fav-item-topic">${q.topicName}</span>
      <span class="badge b${q.d[0]}">${q.d}</span>
      <button class="fav-rm" onclick="removeFav(${q.n})" title="Remove">✕</button>
    </div>`).join('')}
  </div>
  <div class="fav-footer"><button class="fav-clear" onclick="clearFavs()">✕ Clear all favourites</button></div>`;
}

/* ─── FILTER ─── */
function filt(type,btn){
  document.querySelectorAll('.ntab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.qrow').forEach(row=>{
    const d=row.dataset.diff, n=parseInt(row.dataset.qn);
    let show=true;
    if(type==='easy'&&d!=='easy')show=false;
    if(type==='medium'&&d!=='medium')show=false;
    if(type==='hard'&&d!=='hard')show=false;
    if(type==='done'&&!done.has(n))show=false;
    if(type==='todo'&&done.has(n))show=false;
    if(type==='fav'&&!favs.has(n))show=false;
    row.style.display=show?'':'none';
  });
}

            <tr class="qrow${done.has(q.n)?' done-r':''}${favs.has(q.n)?' fav-r':''}" data-diff="${q.d}" data-qn="${q.n}">
              <td class="q-num">${q.n}</td>
              <td class="q-name"><a href="https://leetcode.com/problems/${slug(q.t)}/" target="_blank">${q.t}</a></td>
              <td><span class="badge b${q.d[0]}">${q.d}</span></td>
              <td class="q-actions">
                <button class="star-btn${favs.has(q.n)?' on':''}" id="star-${q.n}" onclick="toggleFav(${q.n},${i},this)" title="${favs.has(q.n)?'Remove from favourites':'Save to favourites'}">⭐</button>
                <button class="dbtn${done.has(q.n)?' on':''}" onclick="toggleDone(${q.n},${i},this)">${done.has(q.n)?'✓ Done':'Mark done'}</button>
              </td>
            </tr>`).join('')}
          </tbody>
        </table>
      </div>
    </div>`;
  }).join('');
  TOPICS.forEach((_,i)=>updateBar(i));
}

render();
updateGlobal();
renderFavPanel();
</script>
</body>
</html>
